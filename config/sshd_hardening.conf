# /etc/ssh/sshd_config.d/99-remote-dev.conf
# SSH hardening for remote development via Tailscale + VSCode Remote SSH.
# Managed by remote-dev-setup. https://github.com/bolin8017/remote-dev-setup

# --- Authentication ---
PermitRootLogin no
PubkeyAuthentication yes
KbdInteractiveAuthentication no
PermitEmptyPasswords no
MaxAuthTries 3
LoginGraceTime 30
# PasswordAuthentication and AuthenticationMethods are set dynamically
# by setup.sh based on whether SSH keys are configured.

# --- Session ---
ClientAliveInterval 60
ClientAliveCountMax 3
MaxSessions 10

# --- Forwarding (required for VSCode Remote SSH) ---
AllowTcpForwarding yes
AllowAgentForwarding yes
AllowStreamLocalForwarding yes

# --- Security ---
X11Forwarding no
PrintMotd no
UsePAM yes
AcceptEnv LANG LC_*
